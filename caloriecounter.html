<!DOCTYPE html><html>
    <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width"/>
    <link rel="stylesheet" href="#"/>
    <title>Jigme</title>
    </head>
    <body>
        <h1>This is a Calorie Counter</h1>
        <div class = "container">
            <form id "calorie-counter">
                <label for = "calorie-input">Budget</label>
                <input id = "calorie-input"
                type = "number"
                min = "0"
                placeholder = "Daily Calorie Budget" required/>
                <fieldset id = "breakfast">
                    <legend>Breakfast</legend>
                </fieldset>
                 <fieldset id = "lunch">
                    <legend>Lunch</legend>
                </fieldset>
                 <fieldset id = "dinner">
                    <legend>Dinner</legend>
                </fieldset>
                 <fieldset id = "snacks">
                    <legend>Snacks</legend>
                </fieldset>
                 <fieldset id = "exercise">
                    <legend>Exercise</legend>
                </fieldset>
                <div class="controls">
                <label for="add-food-exercise">Add food or exercise</label>
                <select id = "add-food-exercise">
                    <option value="breakfast" selected>Breakfast</option>
                    <option value="lunch">Lunch</option>
                    <option value="dinner">Dinner</option>
                    <option value="snacks">Snacks</option>
                    <option value="exercise">Exercise</option>
                </select>
                <button type = "btn" id = "add-entry">Add Entry</button>
                <div> 
                </div>
                <button type="submit">Calculate Remaining Calories</button>
                <button type="clear">Clear</button>
                </div>
            </form>
            <div id = "output" class="output hide"></div>
        </div>
        <script src="script.js"></script>
    </body>
</html>
